name: checks

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m compileall -q rental_manager scripts tests
      - run: ruff check rental_manager/security rental_manager/observability scripts/maintenance tests/test_security.py
      - run: ruff format --check rental_manager/security rental_manager/observability scripts/maintenance tests/test_security.py
      - run: mypy rental_manager/security/pins.py rental_manager/security/secrets.py
      - run: python -m unittest discover -s tests -v

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python scripts/check_secrets.py

  web:
    runs-on: ubuntu-latest
    env:
      RENTAL_MANAGER_DATABASE_URL: sqlite:///data/e2e.db
      PANEL_OWNER_PIN: "735194"
      E2E_OWNER_PIN: "735194"
      RENTAL_MANAGER_ENV: development
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: pip install -r requirements.txt -c constraints.txt
      - run: npm ci
      - run: npm run check:js
      - run: npx playwright install --with-deps chromium
      - run: alembic upgrade head
      - run: uvicorn rental_manager.main:app --host 127.0.0.1 --port 8000 > /tmp/rental-manager.log 2>&1 &
      - run: for i in $(seq 1 30); do curl -fsS http://127.0.0.1:8000/healthz && exit 0; sleep 1; done; exit 1
      - run: npm run test:web

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t rental-manager:ci .

  android:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - shell: powershell
        run: ./android/RentalManager/build-apk.ps1 -JavaHome $env:JAVA_HOME
      - uses: actions/upload-artifact@v4
        with:
          name: rental-manager-mobile
          path: android/RentalManager/build/rental-manager-mobile.apk
